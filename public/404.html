<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Haushalt Moosburg</title>
    <script>
      // SPA fallback for GitHub Pages: preserve original path in a query param,
      // root index.html picks it up. https://github.com/rafgraph/spa-github-pages
      (function () {
        var segmentCount = 1; // /haushaltvis/  → one segment to preserve
        var l = window.location;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname
              .split("/")
              .slice(0, 1 + segmentCount)
              .join("/") +
            "/?p=/" +
            l.pathname
              .slice(1)
              .split("/")
              .slice(segmentCount)
              .join("/")
              .replace(/&/g, "~and~") +
            (l.search ? "&q=" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
