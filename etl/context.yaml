  2021: 19309
  2022: 19505
  2023: 19706   # interpoliert
  2024: 19906   # interpoliert
  2025: 20107
  2026: 20300   # Schätzung

cpi:
  2016: 94.9
  2017: 96.3
  2018: 98.0
  2019: 99.4
  2020: 100.0
