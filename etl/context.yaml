# ─────────────────────────────────────────────────────────────────────────────
# Kontextdaten für relative Betrachtungen in den Timelines.
#
# population: Einwohnerzahl der Stadt Moosburg a.d. Isar je Jahr.
#   Amtliche Stützpunkte: 2016, 2018–2022, 2025. Übrige Jahre linear interpoliert
#   bzw. für 2026 fortgeschrieben (mit # markiert). 2022 = 19.505 laut LfStat/
#   citypopulation; 2016 = 18.181 (von der Stadt gemeldet, vorläufig).
# cpi: Verbraucherpreisindex Deutschland, Jahresdurchschnitt, Basis 2020 = 100
#   (Statistisches Bundesamt). 2025/2026 aus den amtlichen Inflationsraten
#   fortgeschrieben (2025: +2,2 %; 2026: Prognose ~+2 %).
# ─────────────────────────────────────────────────────────────────────────────

population:
