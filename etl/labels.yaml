# ─────────────────────────────────────────────────────────────────────────────
# Kuratierte, gut lesbare Namen für Gliederungs-Gruppen.
#
# Hintergrund: Eine 2-stellige Gliederungsgruppe (Abschnitt) enthält oft mehrere
# benannte Einrichtungen (z. B. Abschnitt 21 = zwei Grundschulen). Einzelne
# Posten (volle GLZ) haben saubere eigene Namen aus den Daten; die GRUPPEN
# brauchen einen generischen Namen, damit nicht eine Einrichtung für die ganze
# Gruppe steht.
#
# abschnitt:      2-stellige GLZ -> Gruppenname
# unterabschnitt: 3-stellige GLZ -> feinerer Gruppenname (optional, gewinnt)
#
# Leaf-Namen (einzelne Einrichtungen) kommen weiter direkt aus den Daten (GLZ-Text).
# ─────────────────────────────────────────────────────────────────────────────

