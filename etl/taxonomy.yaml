# ─────────────────────────────────────────────────────────────────────────────
# Themen-Taxonomie (Schiene B) — 11 Themen, frei M:N.
#
# Das kamerale Rückgrat bleibt unberührt (Schiene A). Hier wird die laienfreund-
# liche Themen-Schicht DARÜBER gelegt. Ein Unterabschnitt/Posten kann MEHREREN
# Themen zugeordnet sein und zählt dann VOLL in jedem (keine anteilige Aufteilung,
# Themen-Summen müssen nicht zur kameralen Summe passen).
#
# Zuordnung: Standard je Bereich (2-stellige GLZ), Ausnahmen je Gliederung
# (4-/5-stellig) in gliederung_overrides. Danach: python etl/classify.py
# ─────────────────────────────────────────────────────────────────────────────

themes:
  kinder_jugend_familie:
    label: "Kinder, Jugend & Familie"
    color: "#f4830a"
    description: "Kindertageseinrichtungen, Krippen, Horte und die offene Jugendarbeit."
  bildung:
    label: "Bildung & Schulen"
    color: "#009ac7"
    description: "Grund- und Mittelschulen, Schülerbeförderung und Erwachsenenbildung (VHS)."
  soziales:
    label: "Soziales & Senioren"
    color: "#e91e8c"
    description: "Soziale Sicherung, Obdachlosenhilfe, sozialer Wohnungsbau, Stiftungen und Bestattung."
  sport_gesundheit:
    label: "Sport & Gesundheit"
    color: "#0a9e4c"
    description: "Bäder, Sportanlagen und Sportförderung."
  kultur_freizeit:
    label: "Freizeit & Kultur"
    color: "#6b3e7a"
    description: "Museen, Heimat- und Kulturpflege, Feste, Bücherei, Stadthalle und Vereinsleben."
  mobilitaet:
    label: "Mobilität & Infrastruktur"
    color: "#3b3f9a"
    description: "Straßen, Brücken, Parken, Beleuchtung, Bauhof sowie Strom- und Wasserversorgung."
  wohnen:
    label: "Wohnen, Bauen & Stadtentwicklung"
    color: "#b8964e"
    description: "Bauverwaltung, Städtebau, Wohnungsbau und der städtische Grundbesitz."
  umwelt:
    label: "Umwelt, Klima & Natur"
    color: "#78be1e"
    description: "Naturschutz, Grünanlagen, Gewässer, Stadtwald, Abwasser und Abfall."
  sicherheit:
    label: "Sicherheit & Ordnung"
    color: "#e5202e"
    description: "Öffentliche Ordnung, Feuerwehr, Katastrophenschutz sowie Sauberkeit (Reinigung)."
  wirtschaft:
    label: "Wirtschaft & Tourismus"
    color: "#f5d400"
    description: "Wirtschaftsförderung, Öffentlichkeitsarbeit, Märkte und Innenstadt/Stadtleben."
  verwaltung_finanzen:
    label: "Verwaltung & Finanzen"
    color: "#8a8170"
    description: "Rathaus, Verwaltung und die allgemeine Finanzwirtschaft (Steuern, Umlagen, Kredite)."

# Standard-Zuordnung je Bereich (2-stellige GLZ). Liste = ein oder mehrere Themen.
abschnitt_themes:
  # Einzelplan 0 — Allgemeine Verwaltung
  "00": [verwaltung_finanzen]
  "02": [verwaltung_finanzen]
  "03": [verwaltung_finanzen]
  "05": [verwaltung_finanzen]
  "06": [verwaltung_finanzen]
  "08": [verwaltung_finanzen]
  # Einzelplan 1 — Sicherheit & Ordnung
  "10": [sicherheit]
  "11": [sicherheit]
  "13": [sicherheit]
  "14": [sicherheit]
  # Einzelplan 2 — Schulen
  "21": [bildung]
  "22": [bildung]
  "29": [bildung, mobilitaet]   # Schülerbeförderung
  # Einzelplan 3 — Kultur / Naturschutz
  "30": [kultur_freizeit]
  "32": [kultur_freizeit]
  "34": [kultur_freizeit]       # Heimat-/Kulturpflege, Feste (Feste auch Wirtschaft -> override)
  "35": [bildung, kultur_freizeit]   # VHS (Bildung) + Stadtbücherei (Kultur)
  "36": [umwelt]                # Naturschutz & Landschaftspflege
  "37": [kultur_freizeit]
  # Einzelplan 4 — Soziale Sicherung
  "40": [soziales]
  "43": [soziales]
  "46": [kinder_jugend_familie] # Kitas & Jugendarbeit
  "47": [soziales]
  "49": [soziales]
  # Einzelplan 5 — Gesundheit, Sport, Erholung
  "55": [sport_gesundheit]
  "56": [sport_gesundheit]
  "57": [sport_gesundheit]      # Bäder
  "58": [umwelt, kultur_freizeit]   # Park- & Grünanlagen (Erholung)
  "59": [kultur_freizeit, umwelt]   # Kleingärten & Erholung
  # Einzelplan 6 — Bau & Verkehr
  "60": [wohnen]
  "61": [wohnen]
  "62": [wohnen, soziales]      # Wohnungsbauförderung (sozialer Wohnungsbau)
  "63": [mobilitaet]
  "64": [mobilitaet]
  "66": [mobilitaet]
  "67": [mobilitaet]            # Beleuchtung (Reinigung/Winterdienst -> override sicherheit)
  "68": [mobilitaet]
  "69": [umwelt]                # Gewässer & Wasserbau
  # Einzelplan 7 — Öffentliche Einrichtungen, Wirtschaft
  "70": [umwelt]                # Abwasser (Kanal & Kläranlage)
  "71": [sicherheit]            # WC-Anlagen (Sauberkeit)
  "72": [umwelt]                # Abfall & Wertstoffhof
  "73": [wirtschaft]            # Märkte
  "75": [soziales]              # Bestattung & Friedhöfe
  "76": [kultur_freizeit, wirtschaft]   # Stadthalle, Vereinshaus, WLAN (gemischt -> overrides)
  "77": [mobilitaet]            # Bauhof
  "78": [kultur_freizeit]       # Ausstellungshalle
  "79": [wirtschaft]            # Wirtschaftsförderung & Öffentlichkeitsarbeit
  # Einzelplan 8 — Wirtschaftliche Unternehmen, Grundbesitz
  "81": [mobilitaet]            # Strom- & Wasserversorgung
  "85": [umwelt]                # Stadtwald
  "87": [wirtschaft]            # Sonstige wirtschaftliche Unternehmen
  "88": [wohnen]                # Bebauter Grundbesitz (Gewerbegebiete -> override + wirtschaft)
  "89": [soziales]              # Stiftungen
  # Einzelplan 9 — Finanzwirtschaft
  "90": [verwaltung_finanzen]
  "91": [verwaltung_finanzen]
  "92": [verwaltung_finanzen]
  "96": [verwaltung_finanzen]

# Ausnahmen je Gliederung (gewinnen gegen den Bereichs-Standard).
gliederung_overrides:
  # Sauberkeit -> Ordnung
  "6751": [sicherheit]          # Straßenreinigung
  "6752": [sicherheit]          # Winterdienst
  # Klimaschutz raus aus Sicherheit
  "1141": [umwelt]              # Klimaschutzmanagement
  # Denkmalschutz ist Kultur, nicht Naturschutz
  "3650": [kultur_freizeit]     # Denkmalschutz & -pflege
  # Feste sind Kultur UND Innenstadt/Wirtschaft
  "3430": [kultur_freizeit, wirtschaft]   # Frühlingsfest u. Herbstschau
  "3402": [kultur_freizeit, wirtschaft]   # Festspiele Moosburg
  # Abschnitt 76 auseinanderdividieren
  "7610": [wirtschaft]          # Öffentliche WLAN-Hotspots (digital)
  "7621": [kultur_freizeit]     # Stadthallengebäude
  "7692": [kultur_freizeit, sport_gesundheit]   # Haus der Vereine (Vereinsförderung beidseitig)
  # Versorgung: Wasser auch Umwelt
  "8151": [mobilitaet, umwelt]  # Wasserversorgung
  # Grundbesitz: Gewerbegebiete sind Wirtschaft
  "8812": [wohnen, wirtschaft]  # Gewerbegebiet Degernpoint
  # sozialer Wohnungsbau zusätzlich Soziales
  "8850": [wohnen, soziales]
  "8851": [wohnen, soziales]
  "8852": [wohnen, soziales]
  "8853": [wohnen, soziales]
  "8854": [wohnen, soziales]

default_theme: verwaltung_finanzen
